<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reporting Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #2d3748;
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header span { font-size: 0.85rem; opacity: 0.6; }

    /* ── Layout ── */
    main { max-width: 1100px; margin: 32px auto; padding: 0 24px; }

    /* ── Stat Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-left: 4px solid #667eea;
    }
    .card.green  { border-color: #48bb78; }
    .card.orange { border-color: #ed8936; }
    .card.red    { border-color: #fc8181; }
    .card-label { font-size: 0.75rem; color: #718096; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .card-value { font-size: 2rem; font-weight: 700; color: #2d3748; }
    .card-sub   { font-size: 0.75rem; color: #a0aec0; margin-top: 4px; }

    /* ── Charts Row ── */
    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }
    @media (max-width: 680px) { .charts { grid-template-columns: 1fr; } }

    .chart-card {
      background: white;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .chart-card h3 { font-size: 0.9rem; color: #4a5568; margin-bottom: 16px; }

    /* ── Reports Table ── */
    .table-card {
      background: white;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .table-card h3 { font-size: 0.9rem; color: #4a5568; margin-bottom: 16px; }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 10px 12px; background: #f7fafc; color: #718096; font-weight: 600; border-bottom: 2px solid #e2e8f0; }
    td { padding: 10px 12px; border-bottom: 1px solid #edf2f7; color: #4a5568; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f7fafc; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge.single   { background: #ebf8ff; color: #2b6cb0; }
    .badge.multi    { background: #f0fff4; color: #276749; }
    .badge.scheduled{ background: #fffaf0; color: #975a16; }

    /* ── Loading / Empty ── */
    .loading { text-align: center; padding: 48px; color: #a0aec0; }
    .empty   { text-align: center; padding: 32px; color: #cbd5e0; font-size: 0.9rem; }

    /* ── Refresh button ── */
    .refresh-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: #5a67d8; }
  </style>
</head>
<body>

<header>
  <h1>📊 Reporting Dashboard</h1>
  <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
</header>

<main>

  <!-- Stat Cards -->
  <div class="cards" id="cards">
    <div class="loading">Loading stats…</div>
  </div>

  <!-- Charts -->
  <div class="charts">
    <div class="chart-card">
      <h3>Report Types Breakdown</h3>
      <canvas id="typeChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Reports Generated Over Time</h3>
      <canvas id="timeChart"></canvas>
    </div>
  </div>

  <!-- Reports Table -->
  <div class="table-card">
    <h3>Generated Reports</h3>
    <div id="tableContainer"><div class="loading">Loading reports…</div></div>
  </div>

</main>

<script>
  let typeChart = null;
  let timeChart = null;

  // ── Classify report type by filename convention ──
  function getType(name) {
    if (name.startsWith("multi_"))  return { label: "Multi",     cls: "multi" };
    if (name.startsWith("report_")) return { label: "Scheduled", cls: "scheduled" };
    return { label: "Single", cls: "single" };
  }

  // ── Render stat cards ──
  function renderCards(stats) {
    document.getElementById("cards").innerHTML = `
      <div class="card">
        <div class="card-label">Total Reports</div>
        <div class="card-value">${stats.total_reports}</div>
        <div class="card-sub">All time</div>
      </div>
      <div class="card green">
        <div class="card-label">Single Dataset</div>
        <div class="card-value">${stats.single_dataset_reports}</div>
        <div class="card-sub">Individual uploads</div>
      </div>
      <div class="card orange">
        <div class="card-label">Multi Dataset</div>
        <div class="card-value">${stats.multi_dataset_reports}</div>
        <div class="card-sub">Combined reports</div>
      </div>
      <div class="card red">
        <div class="card-label">Scheduled</div>
        <div class="card-value">${stats.scheduled_reports}</div>
        <div class="card-sub">Auto-generated</div>
      </div>
      <div class="card">
        <div class="card-label">Total Size</div>
        <div class="card-value">${stats.total_size_kb} <span style="font-size:1rem;font-weight:400">KB</span></div>
        <div class="card-sub">Last: ${stats.last_generated || "—"}</div>
      </div>
    `;
  }

  // ── Render donut chart ──
  function renderTypeChart(stats) {
    const ctx = document.getElementById("typeChart").getContext("2d");
    if (typeChart) typeChart.destroy();
    typeChart = new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: ["Single", "Multi", "Scheduled"],
        datasets: [{
          data: [
            stats.single_dataset_reports,
            stats.multi_dataset_reports,
            stats.scheduled_reports,
          ],
          backgroundColor: ["#63b3ed", "#68d391", "#f6ad55"],
          borderWidth: 2,
          borderColor: "#fff",
        }],
      },
      options: {
        plugins: { legend: { position: "bottom" } },
        cutout: "60%",
      },
    });
  }

  // ── Render timeline bar chart ──
  function renderTimeChart(reports) {
    // Group by date
    const counts = {};
    reports.forEach(r => {
      const date = r.created_at.split(" ")[0];
      counts[date] = (counts[date] || 0) + 1;
    });

    const labels = Object.keys(counts).sort();
    const data   = labels.map(d => counts[d]);

    const ctx = document.getElementById("timeChart").getContext("2d");
    if (timeChart) timeChart.destroy();
    timeChart = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [{
          label: "Reports",
          data,
          backgroundColor: "#667eea",
          borderRadius: 4,
        }],
      },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1 } },
        },
      },
    });
  }

  // ── Render reports table ──
  function renderTable(reports) {
    if (!reports.length) {
      document.getElementById("tableContainer").innerHTML =
        '<div class="empty">No reports generated yet.</div>';
      return;
    }

    const rows = reports.map(r => {
      const t = getType(r.name);
      return `
        <tr>
          <td>${r.name}</td>
          <td><span class="badge ${t.cls}">${t.label}</span></td>
          <td>${r.size_kb} KB</td>
          <td>${r.created_at}</td>
        </tr>
      `;
    }).join("");

    document.getElementById("tableContainer").innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Filename</th>
            <th>Type</th>
            <th>Size</th>
            <th>Generated At</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  // ── Main loader ──
  async function loadAll() {
    try {
      const [statsRes, reportsRes] = await Promise.all([
        fetch("/dashboard/stats"),
        fetch("/dashboard/reports"),
      ]);

      const statsData   = await statsRes.json();
      const reportsData = await reportsRes.json();

      renderCards(statsData.stats);
      renderTypeChart(statsData.stats);
      renderTimeChart(reportsData.reports);
      renderTable(reportsData.reports);

    } catch (err) {
      document.getElementById("cards").innerHTML =
        `<div class="loading" style="color:#fc8181">Failed to load data. Is the server running?</div>`;
      console.error("Dashboard load error:", err);
    }
  }

  // Load on page open
  loadAll();
</script>

</body>
</html>
